<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #252525;
      color: #fff;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 3em; /* Larger title font size */
      margin-bottom: 10px;
    }

    #countdown {
      font-size: 1.5em;
      margin-top: 20px;
    }
  </style>
  <title>Countdown Timer</title>
</head>
<body>
  <div class="container">
    <h1>ECCV</h1>
    <div id="countdown"></div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Set the date of your special day (format: month/day/year)
      const specialDay = new Date('03/08/2024 05:00:00').getTime();

      // Update the countdown every second
      const countdownElement = document.getElementById('countdown');
      setInterval(function() {
        const now = new Date().getTime();
        const distance = specialDay - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        countdownElement.innerHTML = `${days} days ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')} left`;
      }, 1000);
    });
  </script>
</body>
</html>
