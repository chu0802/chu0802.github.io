      background: #f0f4f8;

      padding: 20px;
    }
    .row-container {
      margin-bottom: 80px;
    }
    .row-description {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #333;
    }
    .row {
      display: flex;
      gap: 50px;
      align-items: flex-start;
    }
    .item {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      width: 240px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-align: center;
      padding-bottom: 10px;
    }
    .item:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }
    .item img {
      width: 100%;
      height: auto;
      display: block;
    }
    .audio-block {
      margin: 12px 0;
    }
    .audio-description {
      font-size: 0.85rem;
      color: #555;
      margin-top: 4px;
      padding: 0 6px;
    }
    .item audio {
      width: 80%;
      margin: 0 auto;
      display: block;
    }
  </style>

    rows.forEach(rowData => {
      // 每列容器
      const container = document.createElement('div');
      container.classList.add('row-container');

      // 列描述
      const descEl = document.createElement('div');
      descEl.classList.add('row-description');
      descEl.textContent = rowData.description;
      container.appendChild(descEl);

      // 建立該排
      const rowEl = document.createElement('div');
      rowEl.classList.add('row');

      rowData.items.forEach(itemData => {
        const itemEl = document.createElement('div');
        itemEl.classList.add('item');
        // 圖片
        const imgEl = document.createElement('img');
        imgEl.src = itemData.img;
        imgEl.alt = 'Demo Image';
        itemEl.appendChild(imgEl);
        // 多個音訊區塊
        itemData.audios.forEach(audioData => {
          const audioBlock = document.createElement('div');
          audioBlock.classList.add('audio-block');
          audioBlock.innerHTML = `
            <audio controls>
              <source src="${audioData.src}" type="audio/wav" />
              您的瀏覽器不支持 audio 標籤。
            </audio>
            <div class=\"audio-description\">${audioData.description || ''}</div>
          `;
          itemEl.appendChild(audioBlock);
        });

        rowEl.appendChild(itemEl);
      });

      container.appendChild(rowEl);
      gallery.appendChild(container);
    });
