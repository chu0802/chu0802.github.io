    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      margin: 0;
      padding: 20px;
    }
    .row-container {
      margin-bottom: 80px;
    }
    .row-description {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #333;
    }
    .row {
      display: flex;
      gap: 50px;
      align-items: flex-start;
    }
    .item {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      width: 230px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-align: center;
      padding: 24px 10px 10px;
      position: relative;
    }
    .item:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }
    .item-number {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 28px;
      height: 28px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 0.85rem;
    }
    .item img {
      width: 90%;
      height: auto;
      display: block;
      margin: 24px auto 0;
      border-radius: 12px;
    }
    .audio-block {
      margin: 12px 0;
    }
    .audio-description {
      font-size: 0.85rem;
      color: #555;
      margin-top: 4px;
      padding: 0 6px;
    }
    .item audio {
      width: 80%;
      margin: 0 auto;
      display: block;
    }
  </style>

    let globalIndex = 1;

    rows.forEach(rowData => {
      const container = document.createElement('div');
      container.classList.add('row-container');

      const descEl = document.createElement('div');
      descEl.classList.add('row-description');
      descEl.textContent = rowData.description;
      container.appendChild(descEl);

      const rowEl = document.createElement('div');
      rowEl.classList.add('row');

      rowData.items.forEach(itemData => {
        const itemEl = document.createElement('div');
        itemEl.classList.add('item');

        const numEl = document.createElement('div');
        numEl.classList.add('item-number');
        numEl.textContent = globalIndex++;
        itemEl.appendChild(numEl);

        const imgEl = document.createElement('img');
        imgEl.src = itemData.img;
        imgEl.alt = 'Demo Image';
        itemEl.appendChild(imgEl);

        itemData.audios.forEach(audioData => {
          const audioBlock = document.createElement('div');
          audioBlock.classList.add('audio-block');
          audioBlock.innerHTML = `
            <audio controls>
              <source src="${audioData.src}" type="audio/wav" />
              您的瀏覽器不支持 audio 標籤。
            </audio>
            <div class=\"audio-description\">${audioData.description || ''}</div>
          `;
          itemEl.appendChild(audioBlock);
        });

        rowEl.appendChild(itemEl);
      });

      container.appendChild(rowEl);
      gallery.appendChild(container);
    });
